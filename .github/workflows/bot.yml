name: F1 Highlights Bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lancer le bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          pip install requests -q
          python bot.py

      - name: Sauvegarder les videos vues
        run: |
          git config user.name 'F1 Bot'
          git config user.email 'bot@f1.com'
          git add seen_videos.json
          git diff --cached --quiet || git commit -m 'Update seen videos'
          git push origin main
